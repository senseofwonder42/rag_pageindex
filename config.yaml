# Non-secret configuration defaults.
# Secrets (api keys) must be set in .env or as environment variables — never here.
# Environment variables always override values in this file.

log_level: INFO

# LLM backend (OpenAI-compatible: OpenRouter, vLLM, etc.)
# Must be a vision-capable model for the VLM-per-page pipeline.
llm_model: google/gemma-4-31b-it
llm_base_url: https://openrouter.ai/api/v1
llm_max_retries: 1
llm_retry_delay_s: 1.0
llm_temperature: 0.0
llm_max_output_tokens: 4096
llm_timeout: 120.0

# PageIndex pipeline tuning

# Stamp a zero-padded node_id on every tree node (depth-first). No LLM call.
pageindex_add_node_id: true

# Two-stage summaries: leaves are rolled up from the per-page descriptions
# returned by the VLM batch call; internal nodes are reduced bottom-up from
# their child summaries. Set false to skip both passes entirely.
pageindex_add_node_summary: false

# Embed raw page text into each leaf node's `text` field in the final output.
# No LLM call. Significantly enlarges the output JSON.
pageindex_add_node_text: false

# Generate a single-sentence document description from the tree of node
# summaries. Requires pageindex_add_node_summary: true to have run first.
pageindex_add_doc_description: false

# DPI used when rendering each page to PNG before sending to the VLM.
# 144 dpi gives ~1568px on A4 at the long edge — the Anthropic/OpenAI
# recommended sweet spot for cost vs. legibility. Lower values save image
# tokens; raise to 192 for dense academic papers if small headings are
# being missed.
pageindex_vlm_dpi: 144

# Number of page images sent per VLM call. Higher batches reduce call
# count (each batch is one LLM call) but raise per-call token cost.
pageindex_vlm_pages_per_batch: 4

# Hard cap on images-per-prompt enforced by some providers (OpenRouter→
# Nvidia: 10). The effective batch is min(pages_per_batch, max_images_per_call).
pageindex_vlm_max_images_per_call: 4
